<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&S Investment</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter for a modern clean look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              sapient: {
                teal: '#2563EB',      // Primary: Royal Blue (matches "Know More" buttons)
                'teal-dark': '#172554', // Darker Blue: Deep Navy (hover states)
                'teal-light': '#60A5FA', // Lighter Blue
                slate: '#1E293B',     // Slate 800 (Headings)
                dark: '#0F172A',      // Slate 900 (Footer/Deep Backgrounds)
                gold: '#0284C7',      // Accent: Sky Blue 600 (Replaces Gold with Tech Blue)
                'gold-light': '#7DD3FC', // Sky 300
                gray: '#F1F5F9',      // Slate 100
                cream: '#F8FAFC',     // Slate 50 (Cool White background)
                textGray: '#64748B',  // Slate 500 (Body text)
              }
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
              'premium-gradient': 'linear-gradient(135deg, #172554 0%, #2563EB 100%)', // Navy to Royal Blue
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 96px;
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }

      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #2563EB;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #172554;
      }
      .dropdown-enter {
        opacity: 0;
        transform: translateY(-10px);
      }
      .dropdown-enter-active {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 300ms, transform 300ms;
      }
      
      /* Glassmorphism utility */
      .glass {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      
      .glass-dark {
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Shine Animation */
      @keyframes shine-move {
        0% { transform: translateX(-150%) skewX(-20deg); }
        40% { transform: translateX(250%) skewX(-20deg); }
        100% { transform: translateX(250%) skewX(-20deg); }
      }
      
      .shine-effect {
        animation: shine-move 3s infinite ease-in-out;
      }

      /* Loader Animations */
      @keyframes slide-up-fade {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes expand-line {
        0% { transform: scaleX(0); opacity: 0; }
        100% { transform: scaleX(1); opacity: 1; }
      }
      @keyframes float-y {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
