<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download Mint App</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 20% 10%, #e6f4ff 0%, #f5f8ff 40%, #ffffff 100%);
        color: #0f172a;
      }

      .card {
        width: min(92vw, 440px);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.14);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 16px;
        color: #334155;
        line-height: 1.5;
      }

      .links {
        display: grid;
        gap: 10px;
      }

      a {
        display: block;
        text-decoration: none;
        font-weight: 600;
        text-align: center;
        padding: 12px 14px;
        border-radius: 10px;
      }

      .play {
        background: #16a34a;
        color: #ffffff;
      }

      .app {
        background: #0f172a;
        color: #ffffff;
      }

      .hint {
        margin-top: 12px;
        font-size: 0.9rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Opening Store...</h1>
      <p>If you are not redirected automatically, choose your app store below.</p>

      <div class="links">
        <a
          class="play"
          href="https://play.google.com/store/apps/details?id=com.iw.mint.app&pcampaignid=web_share"
          rel="noopener noreferrer"
        >
          Open on Google Play
        </a>
        <a
          class="app"
          href="https://apps.apple.com/us/app/mint-by-investwell/id1479042500"
          rel="noopener noreferrer"
        >
          Open on App Store
        </a>
      </div>

      <p id="hint" class="hint">Detecting your device...</p>
    </main>

    <script>
      (function () {
        var playStoreUrl =
          'https://play.google.com/store/apps/details?id=com.iw.mint.app&pcampaignid=web_share';
        var appStoreUrl = 'https://apps.apple.com/us/app/mint-by-investwell/id1479042500';

        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isAndroid = /Android/i.test(ua);
        var isiOS =
          /iPhone|iPad|iPod/i.test(ua) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        var destination = isAndroid ? playStoreUrl : isiOS ? appStoreUrl : playStoreUrl;
        var hint = document.getElementById('hint');

        if (hint) {
          hint.textContent = isAndroid
            ? 'Android detected. Redirecting to Google Play...'
            : isiOS
            ? 'iPhone/iPad detected. Redirecting to App Store...'
            : 'Device not recognized. Redirecting to Google Play by default...';
        }

        window.location.replace(destination);
      })();
    </script>
  </body>
</html>
